<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Диплом - мобильный просмотр</title>
  <style>
    :root {
      --bg: #04070d;
      --panel: rgba(18, 28, 41, 0.78);
      --text: #e8f3ff;
      --line: rgba(181, 219, 245, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Montserrat, sans-serif;
      overflow: hidden;
    }

    .viewer-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 15% 10%, rgba(84, 134, 173, 0.28), transparent 42%),
        radial-gradient(circle at 85% 80%, rgba(121, 179, 212, 0.2), transparent 45%),
        var(--bg);
    }

    .toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
    }

    .toolbar p {
      margin: 0;
      font-size: 0.68rem;
      line-height: 1.25;
      letter-spacing: 0.01em;
      color: rgba(232, 243, 255, 0.9);
    }

    .toolbar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 94px;
      height: 30px;
      padding: 0 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(186, 221, 245, 0.48);
      text-decoration: none;
      color: #eaf6ff;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: linear-gradient(120deg, rgba(112, 163, 177, 0.72), rgba(241, 148, 138, 0.76));
      box-shadow: 0 10px 16px -12px rgba(115, 172, 213, 0.56);
    }

    .viewer {
      flex: 1 1 auto;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pdf-frame {
      width: 500vw;
      height: 500vh;
      border: 0;
      transform: scale(0.2);
      transform-origin: top left;
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="viewer-wrap">
    <header class="toolbar">
      <p>Мобильный просмотр уменьшен в 5 раз.</p>
      <a href="/landing/diplom.pdf" target="_blank" rel="noopener noreferrer">Оригинал PDF</a>
    </header>
    <section class="viewer" aria-label="Мобильный просмотр диплома">
      <iframe class="pdf-frame" src="/landing/diplom.pdf#zoom=25" title="Диплом"></iframe>
    </section>
  </main>
</body>
</html>
